<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOCUS — Pomodoro Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --bg:#000000;
    --fg:#ededed;
    --fg-dim:#6b6b6b;
    --fg-faint:#2a2a2a;
    --accent:#ff6b35;
    --accent-dim:#3a2418;
    --ring-track:#1a1a1a;
    --font-display:'Space Grotesk', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html,body{
    background:var(--bg);
    color:var(--fg);
    font-family:var(--font-display);
    height:100%;
    overflow:hidden;
  }

  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    min-height:100vh;
    padding:32px 24px 24px;
    position:relative;
  }

  /* faint grain texture */
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background-image:
      radial-gradient(circle at 50% 0%, rgba(255,107,53,0.04), transparent 60%);
    pointer-events:none;
    z-index:0;
  }

  .top{
    width:100%;
    max-width:520px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    z-index:1;
  }

  .logo{
    font-family:var(--font-mono);
    font-size:13px;
    letter-spacing:0.25em;
    font-weight:700;
    color:var(--fg);
  }
  .logo span{ color:var(--accent); }

  .session-count{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.1em;
    color:var(--fg-dim);
  }

  .modes{
    display:flex;
    gap:4px;
    background:#0a0a0a;
    border:1px solid var(--fg-faint);
    border-radius:100px;
    padding:4px;
    z-index:1;
    margin-top:28px;
  }

  .mode-btn{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--fg-dim);
    background:transparent;
    border:none;
    padding:9px 18px;
    border-radius:100px;
    cursor:pointer;
    transition:all 0.25s ease;
  }

  .mode-btn.active{
    background:var(--fg);
    color:#000;
  }

  .mode-btn:not(.active):hover{
    color:var(--fg);
  }

  .ring-wrap{
    position:relative;
    width:min(78vw, 360px);
    height:min(78vw, 360px);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1;
  }

  svg.ring{
    width:100%;
    height:100%;
    transform:rotate(-90deg);
  }

  .ring-track{
    fill:none;
    stroke:var(--ring-track);
    stroke-width:2;
  }

  .ring-progress{
    fill:none;
    stroke:var(--accent);
    stroke-width:2;
    stroke-linecap:round;
    transition:stroke-dashoffset 1s linear;
    filter:drop-shadow(0 0 8px rgba(255,107,53,0.45));
  }

  .timer-core{
    position:absolute;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
  }

  .time{
    font-family:var(--font-mono);
    font-size:clamp(48px, 13vw, 76px);
    font-weight:500;
    letter-spacing:-0.02em;
    line-height:1;
    font-variant-numeric:tabular-nums;
  }

  .status-label{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:var(--fg-dim);
  }

  .status-label.live{ color:var(--accent); }

  .controls{
    display:flex;
    align-items:center;
    gap:18px;
    z-index:1;
    margin-top:8px;
  }

  .btn-circle{
    width:52px;
    height:52px;
    border-radius:50%;
    border:1px solid var(--fg-faint);
    background:transparent;
    color:var(--fg-dim);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:all 0.2s ease;
  }

  .btn-circle:hover{
    border-color:var(--fg-dim);
    color:var(--fg);
  }

  .btn-circle svg{
    width:18px;
    height:18px;
  }

  .btn-main{
    width:84px;
    height:84px;
    border-radius:50%;
    border:none;
    background:var(--fg);
    color:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:all 0.2s ease;
  }

  .btn-main:hover{
    transform:scale(1.04);
    background:var(--accent);
  }

  .btn-main:active{ transform:scale(0.97); }

  .btn-main svg{
    width:26px;
    height:26px;
  }

  .bottom{
    width:100%;
    max-width:520px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
    z-index:1;
  }

  .dots{
    display:flex;
    gap:9px;
  }

  .dot{
    width:7px;
    height:7px;
    border-radius:50%;
    background:var(--fg-faint);
    transition:all 0.3s ease;
  }

  .dot.done{ background:var(--accent); }

  .hint{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:0.12em;
    color:#3a3a3a;
    text-transform:uppercase;
  }

  @media (max-width:420px){
    .modes{ margin-top:18px; }
    .logo{ font-size:12px; }
  }
</style>
</head>
<body>

  <div class="top">
    <div class="logo">FOCUS<span>.</span></div>
    <div class="session-count" id="sessionCount">SESSION 1</div>
  </div>

  <div class="modes" id="modes">
    <button class="mode-btn active" data-mode="focus">Fokus</button>
    <button class="mode-btn" data-mode="short">Qisqa tanaffus</button>
    <button class="mode-btn" data-mode="long">Uzoq tanaffus</button>
  </div>

  <div class="ring-wrap">
    <svg class="ring" viewBox="0 0 200 200">
      <circle class="ring-track" cx="100" cy="100" r="92"></circle>
      <circle class="ring-progress" id="ringProgress" cx="100" cy="100" r="92"></circle>
    </svg>
    <div class="timer-core">
      <div class="time" id="timeDisplay">25:00</div>
      <div class="status-label" id="statusLabel">TAYYOR</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-circle" id="resetBtn" title="Qayta boshlash">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
      </svg>
    </button>
    <button class="btn-main" id="playBtn" title="Boshlash">
      <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"></path>
      </svg>
    </button>
    <button class="btn-circle" id="skipBtn" title="O'tkazib yuborish">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 4 15 12 5 20 5 4"></polygon>
        <line x1="19" y1="5" x2="19" y2="19"></line>
      </svg>
    </button>
  </div>

  <div class="bottom">
    <div class="dots" id="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="hint">25 daqiqa fokus &middot; 5 daqiqa tanaffus &middot; 4 davrdan keyin uzoq tanaffus</div>
  </div>

<script>
(function(){
  const DURATIONS = { focus: 25*60, short: 5*60, long: 15*60 };
  const LABELS = { focus: 'FOKUS', short: 'TANAFFUS', long: 'UZOQ TANAFFUS' };

  let mode = 'focus';
  let secondsLeft = DURATIONS.focus;
  let totalSeconds = DURATIONS.focus;
  let running = false;
  let timerId = null;
  let pomodoroCount = 0; // completed focus sessions in current cycle (0-3)
  let sessionNumber = 1;

  const timeDisplay = document.getElementById('timeDisplay');
  const statusLabel = document.getElementById('statusLabel');
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const resetBtn = document.getElementById('resetBtn');
  const skipBtn = document.getElementById('skipBtn');
  const modesWrap = document.getElementById('modes');
  const ringProgress = document.getElementById('ringProgress');
  const sessionCountEl = document.getElementById('sessionCount');
  const dots = document.querySelectorAll('.dot');

  const RADIUS = 92;
  const CIRCUMFERENCE = 2 * Math.PI * RADIUS;
  ringProgress.style.strokeDasharray = CIRCUMFERENCE;
  ringProgress.style.strokeDashoffset = 0;

  const ICON_PLAY = '<path d="M8 5v14l11-7z"></path>';
  const ICON_PAUSE = '<path d="M6 5h4v14H6zM14 5h4v14h-4z"></path>';

  function formatTime(s){
    const m = Math.floor(s/60).toString().padStart(2,'0');
    const sec = (s%60).toString().padStart(2,'0');
    return m + ':' + sec;
  }

  function updateDisplay(){
    timeDisplay.textContent = formatTime(secondsLeft);
    const progress = 1 - (secondsLeft / totalSeconds);
    ringProgress.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
    document.title = formatTime(secondsLeft) + ' — FOCUS';
  }

  function updateStatusLabel(){
    if(running){
      statusLabel.textContent = LABELS[mode] + ' • DAVOM ETMOQDA';
      statusLabel.classList.add('live');
    } else {
      statusLabel.textContent = LABELS[mode];
      statusLabel.classList.remove('live');
    }
  }

  function updateDots(){
    dots.forEach((d, i) => {
      d.classList.toggle('done', i < pomodoroCount);
    });
  }

  function setMode(newMode, resetTimer = true){
    mode = newMode;
    document.querySelectorAll('.mode-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === newMode);
    });
    if(resetTimer){
      pause();
      totalSeconds = DURATIONS[newMode];
      secondsLeft = totalSeconds;
      updateDisplay();
      updateStatusLabel();
    }
  }

  function tick(){
    secondsLeft--;
    updateDisplay();
    if(secondsLeft <= 0){
      handleSessionComplete();
    }
  }

  function handleSessionComplete(){
    pause();
    playNotificationSound();

    if(mode === 'focus'){
      pomodoroCount++;
      if(pomodoroCount >= 4){
        pomodoroCount = 0;
        sessionNumber++;
        setMode('long');
      } else {
        setMode('short');
      }
    } else {
      sessionNumber++;
      setMode('focus');
    }
    updateDots();
    sessionCountEl.textContent = 'SESSION ' + sessionNumber;
  }

  function playNotificationSound(){
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 660;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5);
      osc.start();
      osc.stop(ctx.currentTime + 0.5);

      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.connect(gain2);
      gain2.connect(ctx.destination);
      osc2.frequency.value = 880;
      osc2.type = 'sine';
      gain2.gain.setValueAtTime(0.0001, ctx.currentTime + 0.15);
      gain2.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime + 0.17);
      gain2.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.65);
      osc2.start(ctx.currentTime + 0.15);
      osc2.stop(ctx.currentTime + 0.65);
    }catch(e){}
  }

  function play(){
    if(running) return;
    running = true;
    playIcon.innerHTML = ICON_PAUSE;
    updateStatusLabel();
    timerId = setInterval(tick, 1000);
  }

  function pause(){
    running = false;
    playIcon.innerHTML = ICON_PLAY;
    clearInterval(timerId);
    updateStatusLabel();
  }

  function toggle(){
    if(running) pause(); else play();
  }

  function reset(){
    pause();
    secondsLeft = totalSeconds;
    updateDisplay();
  }

  function skip(){
    pause();
    handleSessionComplete();
  }

  playBtn.addEventListener('click', toggle);
  resetBtn.addEventListener('click', reset);
  skipBtn.addEventListener('click', skip);

  modesWrap.addEventListener('click', (e) => {
    const btn = e.target.closest('.mode-btn');
    if(!btn) return;
    setMode(btn.dataset.mode);
  });

  document.addEventListener('keydown', (e) => {
    if(e.code === 'Space'){
      e.preventDefault();
      toggle();
    }
  });

  updateDisplay();
  updateStatusLabel();
  updateDots();
})();
</script>

</body>
</html>
